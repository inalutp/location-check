<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Location Check</title>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.1.0",
          "react-dom/client": "https://esm.sh/react-dom@19.1.0/client"
        }
      }
    </script>
    <style>
      :root {
        color: #17201b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef3ef;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
      }

      button,
      input {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app-shell {
        align-items: center;
        display: flex;
        min-height: 100vh;
        padding: 20px;
      }

      .status-panel {
        background: #f9fbf9;
        border: 1px solid rgba(20, 36, 29, 0.14);
        box-shadow: 0 24px 80px rgba(23, 32, 27, 0.16);
        display: grid;
        grid-template-rows: minmax(190px, 34vh) auto;
        min-height: calc(100vh - 40px);
        overflow: hidden;
        width: 100%;
      }

      .map-visual {
        background:
          radial-gradient(circle at 58% 44%, rgba(255, 249, 200, 0.4), transparent 8%),
          radial-gradient(circle at 58% 44%, rgba(255, 255, 255, 0.24), transparent 25%),
          linear-gradient(135deg, #1d3329, #385f49 54%, #8ab59d);
        min-height: 100%;
        overflow: hidden;
        position: relative;
      }

      .grid-lines {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px);
        background-size: 42px 42px;
        inset: -20%;
        mask-image: radial-gradient(circle at 58% 48%, #000 0%, transparent 70%);
        position: absolute;
        transform: rotate(-12deg);
      }

      .target-ring {
        aspect-ratio: 1;
        border: 2px solid rgba(255, 255, 255, 0.88);
        border-radius: 50%;
        box-shadow:
          0 0 0 16px rgba(255, 255, 255, 0.08),
          0 0 0 42px rgba(255, 255, 255, 0.05);
        left: 58%;
        position: absolute;
        top: 44%;
        transform: translate(-50%, -50%);
        width: min(56vw, 280px);
      }

      .pulse-dot {
        background: #fff9c8;
        border: 9px solid rgba(255, 255, 255, 0.82);
        border-radius: 50%;
        box-shadow: 0 0 52px rgba(255, 249, 200, 0.85);
        height: 32px;
        left: 58%;
        position: absolute;
        top: 44%;
        transform: translate(-50%, -50%);
        width: 32px;
      }

      .content {
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding: 22px;
      }

      .topbar,
      .status-badge,
      .microcopy,
      .notice {
        align-items: center;
        display: flex;
        gap: 8px;
      }

      .topbar {
        flex-wrap: wrap;
        justify-content: space-between;
      }

      .topbar span,
      .topbar a {
        color: #365347;
        font-size: 0.9rem;
        font-weight: 750;
      }

      .topbar a {
        border: 1px solid rgba(54, 83, 71, 0.2);
        border-radius: 999px;
        padding: 10px 13px;
      }

      .status-badge {
        background: #e9f2ec;
        border: 1px solid rgba(48, 123, 82, 0.16);
        border-radius: 999px;
        color: #234537;
        font-size: 0.92rem;
        font-weight: 850;
        padding: 10px 14px;
        width: fit-content;
      }

      .status-panel.near .status-badge {
        background: #dff5e6;
        color: #186b3a;
      }

      .status-panel.far .status-badge {
        background: #fff0dc;
        color: #905718;
      }

      h1 {
        font-size: clamp(2.15rem, 12vw, 4.5rem);
        line-height: 0.98;
        margin: 0;
      }

      .hero p {
        color: #476257;
        font-size: 1.04rem;
        line-height: 1.5;
        margin: 14px 0 0;
      }

      .results-grid {
        display: grid;
        gap: 10px;
        grid-template-columns: 1fr;
      }

      .metric,
      .control-panel,
      .notice,
      .details {
        background: rgba(255, 255, 255, 0.76);
        border: 1px solid rgba(29, 51, 41, 0.1);
        border-radius: 8px;
      }

      .metric {
        display: flex;
        flex-direction: column;
        gap: 9px;
        min-height: 92px;
        padding: 16px;
      }

      .metric span,
      .details dt {
        color: #5b7067;
        font-size: 0.78rem;
        font-weight: 850;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .metric strong {
        color: #17201b;
        font-size: 1.9rem;
        line-height: 1;
      }

      .metric.primary {
        background: #17201b;
      }

      .metric.primary span,
      .metric.primary strong {
        color: #fff;
      }

      .control-panel {
        padding: 17px;
      }

      .control-panel label {
        align-items: center;
        color: #263c33;
        display: grid;
        font-weight: 850;
        gap: 10px;
        grid-template-columns: auto 1fr auto;
      }

      .control-panel output {
        color: #537064;
        font-weight: 800;
      }

      input[type="range"] {
        accent-color: #2d8f55;
        display: block;
        margin-top: 16px;
        width: 100%;
      }

      .threshold-scale {
        color: #6a7c74;
        display: flex;
        font-size: 0.8rem;
        font-weight: 700;
        justify-content: space-between;
        margin-top: 5px;
      }

      .progress {
        background: rgba(23, 32, 27, 0.1);
        border-radius: 999px;
        height: 10px;
        overflow: hidden;
      }

      .progress span {
        background: linear-gradient(90deg, #e1c15d, #2d8f55);
        display: block;
        height: 100%;
        transition: width 180ms ease;
      }

      .actions {
        align-items: stretch;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      button {
        align-items: center;
        background: #246847;
        border: 0;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        display: inline-flex;
        font-weight: 850;
        gap: 10px;
        justify-content: center;
        min-height: 54px;
        padding: 0 18px;
        width: 100%;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .microcopy {
        color: #546b61;
        font-size: 0.94rem;
        font-weight: 720;
        line-height: 1.35;
      }

      .notice {
        align-items: flex-start;
        color: #6f4615;
        line-height: 1.4;
        padding: 14px;
      }

      .details {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .details dt,
      .details dd {
        margin: 0;
      }

      .details dd {
        color: #2f443b;
        font-weight: 750;
        line-height: 1.35;
        margin-top: 6px;
        overflow-wrap: anywhere;
      }

      .icon {
        display: inline-block;
        flex: 0 0 auto;
        height: 1.1em;
        width: 1.1em;
      }

      .spin {
        animation: spin 0.9s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (min-width: 760px) {
        .app-shell {
          padding: 28px;
        }

        .status-panel {
          background:
            linear-gradient(110deg, rgba(247, 250, 247, 0.96) 0%, rgba(247, 250, 247, 0.78) 48%, transparent 49%),
            #244134;
          grid-template-columns: minmax(0, 1fr) minmax(340px, 0.82fr);
          grid-template-rows: auto;
          min-height: min(860px, calc(100vh - 56px));
        }

        .map-visual {
          grid-column: 1 / -1;
          grid-row: 1;
        }

        .content {
          grid-column: 1 / 2;
          grid-row: 1;
          max-width: 760px;
          padding: clamp(32px, 5vw, 64px);
          position: relative;
          z-index: 2;
        }

        .hero {
          margin-top: auto;
        }

        .results-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .actions {
          align-items: center;
          flex-direction: row;
          flex-wrap: wrap;
        }

        button {
          width: auto;
        }

        .details {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          margin-top: auto;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import React, { useMemo, useState } from "react";
      import { createRoot } from "react-dom/client";

      const TARGET_ADDRESS = "21017 Fowlers Mill Circle, Ashburn, VA 20147";
      const FALLBACK_TARGET = {
        lat: 39.0312,
        lng: -77.4869,
        source: "Approximate fallback for Fowlers Mill Circle, Ashburn, VA",
      };
      const feetPerMeter = 3.28084;
      const h = React.createElement;

      function toRadians(value) {
        return (value * Math.PI) / 180;
      }

      function distanceInMeters(start, end) {
        const earthRadius = 6371008.8;
        const deltaLat = toRadians(end.lat - start.lat);
        const deltaLng = toRadians(end.lng - start.lng);
        const startLat = toRadians(start.lat);
        const endLat = toRadians(end.lat);
        const a =
          Math.sin(deltaLat / 2) ** 2 +
          Math.cos(startLat) * Math.cos(endLat) * Math.sin(deltaLng / 2) ** 2;
        return earthRadius * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      function formatFeet(value) {
        if (!Number.isFinite(value)) return "Unknown";
        if (value >= 5280) return `${(value / 5280).toFixed(2)} mi`;
        if (value >= 1000) return `${Math.round(value).toLocaleString()} ft`;
        return `${Math.round(value)} ft`;
      }

      async function geocodeTargetAddress() {
        const params = new URLSearchParams({
          SingleLine: TARGET_ADDRESS,
          f: "json",
          maxLocations: "1",
          outFields: "Match_addr,Addr_type,Score",
        });
        const response = await fetch(
          `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?${params}`,
        );
        if (!response.ok) throw new Error("The address lookup service did not respond.");
        const data = await response.json();
        const candidate = data.candidates?.[0];
        if (!candidate?.location) throw new Error("The target address could not be geocoded.");
        return {
          lat: candidate.location.y,
          lng: candidate.location.x,
          source: candidate.address || TARGET_ADDRESS,
          score: candidate.score,
        };
      }

      function getCurrentPosition() {
        return new Promise((resolve, reject) => {
          if (!window.isSecureContext) {
            reject(new Error("Mobile browsers require HTTPS for location. Upload this file to an HTTPS host, then open that URL."));
            return;
          }
          if (!navigator.geolocation) {
            reject(new Error("This browser does not support location services."));
            return;
          }
          navigator.geolocation.getCurrentPosition(resolve, reject, {
            enableHighAccuracy: true,
            maximumAge: 0,
            timeout: 15000,
          });
        });
      }

      function SvgIcon({ type, className = "" }) {
        const paths = {
          shield: h("path", { d: "M12 3l7 3v5c0 5-3 8-7 10-4-2-7-5-7-10V6l7-3zm-3 9l2 2 4-5", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          pin: h("path", { d: "M12 21s7-5.2 7-11a7 7 0 0 0-14 0c0 5.8 7 11 7 11zm0-8a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          check: h("path", { d: "M9 12l2 2 4-5M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          alert: h("path", { d: "M12 9v4m0 4h.01M10.3 4.3L2.6 18a2 2 0 0 0 1.7 3h15.4a2 2 0 0 0 1.7-3L13.7 4.3a2 2 0 0 0-3.4 0z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          crosshair: h("path", { d: "M12 2v3m0 14v3M2 12h3m14 0h3M12 19a7 7 0 1 0 0-14 7 7 0 0 0 0 14zm0-4a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          locate: h("path", { d: "M12 2v3m0 14v3M2 12h3m14 0h3M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12zm0-3a3 3 0 1 0 0-6 3 3 0 0 0 0 6z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          refresh: h("path", { d: "M21 12a9 9 0 0 1-15.3 6.4M3 12A9 9 0 0 1 18.3 5.6M18 2v4h-4M6 22v-4h4", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          nav: h("path", { d: "M3 11l18-8-8 18-2-8-8-2z", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
          sliders: h("path", { d: "M4 6h10m4 0h2M4 12h2m4 0h10M4 18h10m4 0h2M14 4v4M8 10v4m8 2v4", fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round" }),
        };
        return h("svg", { className: `icon ${className}`, viewBox: "0 0 24 24", "aria-hidden": true }, paths[type]);
      }

      function StatusIcon({ status }) {
        if (status === "near") return h(SvgIcon, { type: "check" });
        if (status === "far") return h(SvgIcon, { type: "alert" });
        return h(SvgIcon, { type: "crosshair" });
      }

      function App() {
        const [radiusFeet, setRadiusFeet] = useState(300);
        const [target, setTarget] = useState(null);
        const [current, setCurrent] = useState(null);
        const [isChecking, setIsChecking] = useState(false);
        const [message, setMessage] = useState(
          window.isSecureContext
            ? "Tap the button to compare your phone location with the Ashburn address."
            : "Open this page from an HTTPS URL to enable mobile location permission.",
        );
        const [error, setError] = useState("");

        const distanceFeet = useMemo(() => {
          if (!current || !target) return null;
          return distanceInMeters(current, target) * feetPerMeter;
        }, [current, target]);

        const accuracyFeet = current?.accuracy ? current.accuracy * feetPerMeter : null;
        const isNear = distanceFeet !== null && distanceFeet <= radiusFeet;
        const status = distanceFeet === null ? "idle" : isNear ? "near" : "far";
        const confidenceWidth = distanceFeet
          ? Math.max(8, Math.min(100, 100 - (distanceFeet / Math.max(radiusFeet, 1)) * 100))
          : 0;

        async function checkLocation() {
          setIsChecking(true);
          setError("");
          setMessage("Requesting your current location...");

          try {
            const [targetPoint, position] = await Promise.allSettled([
              geocodeTargetAddress(),
              getCurrentPosition(),
            ]);
            const resolvedTarget =
              targetPoint.status === "fulfilled" ? targetPoint.value : FALLBACK_TARGET;

            if (targetPoint.status === "rejected") {
              setError("Live address lookup was unavailable, so the app used its local Ashburn fallback coordinate.");
            }

            if (position.status === "rejected") throw position.reason;

            setTarget(resolvedTarget);
            setCurrent({
              lat: position.value.coords.latitude,
              lng: position.value.coords.longitude,
              accuracy: position.value.coords.accuracy,
            });
            setMessage("Location check complete.");
          } catch (caughtError) {
            setMessage("Location check stopped.");
            setError(
              caughtError?.message ||
                "Location permission was blocked or your browser could not determine your position.",
            );
          } finally {
            setIsChecking(false);
          }
        }

        return h(
          "main",
          { className: "app-shell" },
          h(
            "section",
            { className: `status-panel ${status}` },
            h(
              "div",
              { className: "map-visual", "aria-hidden": true },
              h("div", { className: "grid-lines" }),
              h("div", { className: "target-ring" }),
              h("div", { className: "pulse-dot" }),
            ),
            h(
              "div",
              { className: "content" },
              h(
                "nav",
                { className: "topbar", "aria-label": "App status" },
                h("span", null, h(SvgIcon, { type: "shield" }), "Private browser check"),
                h(
                  "a",
                  {
                    href: `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(TARGET_ADDRESS)}`,
                    target: "_blank",
                    rel: "noreferrer",
                  },
                  h(SvgIcon, { type: "pin" }),
                  "View address",
                ),
              ),
              h(
                "div",
                { className: "hero" },
                h(
                  "div",
                  { className: "status-badge" },
                  h(StatusIcon, { status }),
                  distanceFeet === null
                    ? "Ready to check"
                    : isNear
                      ? "You are at or near the address"
                      : "You are not near the address",
                ),
                h("h1", null, "Are you near 21017 Fowlers Mill Circle?"),
                h("p", null, TARGET_ADDRESS),
              ),
              h(
                "div",
                { className: "results-grid" },
                metric("Distance from target", distanceFeet === null ? "--" : formatFeet(distanceFeet), true),
                metric("Near radius", formatFeet(radiusFeet)),
                metric("GPS accuracy", accuracyFeet === null ? "--" : formatFeet(accuracyFeet)),
              ),
              h(
                "div",
                { className: "control-panel" },
                h("label", { htmlFor: "radius" }, h(SvgIcon, { type: "sliders" }), "Near threshold", h("output", null, formatFeet(radiusFeet))),
                h("input", {
                  id: "radius",
                  type: "range",
                  min: "50",
                  max: "1000",
                  step: "25",
                  value: radiusFeet,
                  onChange: (event) => setRadiusFeet(Number(event.target.value)),
                }),
                h("div", { className: "threshold-scale", "aria-hidden": true }, h("span", null, "50 ft"), h("span", null, "1,000 ft")),
              ),
              h("div", { className: "progress", "aria-hidden": true }, h("span", { style: { width: `${isNear ? 100 : confidenceWidth}%` } })),
              h(
                "div",
                { className: "actions" },
                h(
                  "button",
                  { type: "button", onClick: checkLocation, disabled: isChecking },
                  isChecking ? h(SvgIcon, { type: "refresh", className: "spin" }) : h(SvgIcon, { type: "locate" }),
                  isChecking ? "Checking..." : "Check my location",
                ),
                h("div", { className: "microcopy", role: "status", "aria-live": "polite" }, h(SvgIcon, { type: "nav" }), message),
              ),
              error && h("div", { className: "notice", role: "alert" }, h(SvgIcon, { type: "alert" }), error),
              h(
                "dl",
                { className: "details" },
                detail("Target source", target?.source || "Address lookup runs when you check."),
                detail("Your coordinates", current ? `${current.lat.toFixed(6)}, ${current.lng.toFixed(6)}` : "Waiting for browser permission."),
              ),
            ),
          ),
        );
      }

      function metric(label, value, primary = false) {
        return h("article", { className: `metric${primary ? " primary" : ""}` }, h("span", null, label), h("strong", null, value));
      }

      function detail(label, value) {
        return h("div", null, h("dt", null, label), h("dd", null, value));
      }

      createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
